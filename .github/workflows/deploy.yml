name: Build and Deploy

on:
  push:
    branches: [ 'main' ]
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUBUSERNAME }}/cicd-app

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUBUSERNAME }}
          password: ${{ secrets.DOCKERHUBPASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
  

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Debug SSH key
        run: |
          echo "Key length: $(echo '${{ secrets.SSH_PRIVATE_KEY }}' | wc -c)"
          echo "Key starts with: $(echo '${{ secrets.SSH_PRIVATE_KEY }}' | head -c 30)"
          echo "Key ends with: $(echo '${{ secrets.SSH_PRIVATE_KEY }}' | tail -c 30)"

      - name: Deploy to Ubuntu server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }} # Replace with your server's IP address or hostname
          username: ${{ secrets.SERVER_USER }} # Replace with your server's SSH username eg. ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          debug: true
          script: |
            # Pull the latest image
            docker pull ${{ env.IMAGE_NAME }}:latest

            # Stop and remove existing container (if running)
            docker stop cicd-app || true
            docker rm cicd-app || true

            # Run the new container
            docker run -d \
              --name cicd-app \
              --restart unless-stopped \
              -p 8080:8080 \
              -e ASPNETCORE_ENVIRONMENT=Production \
              #-e "ConnectionStrings__DefaultConnection=${{ secrets.DB_CONNECTION_STRING }}" \
              ${{ env.IMAGE_NAME }}:latest

            # Clean up old images
            docker image prune -f
